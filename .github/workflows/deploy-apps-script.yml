name: Deploy to Google Apps Script

on:
  # กดปุ่ม "Run workflow" ใน Actions tab เพื่อ deploy เอง (ควบคุมจังหวะตอนคนใช้น้อย)
  workflow_dispatch:
  # หรือ auto เมื่อ push scr/** ตรงเข้า main (หมายเหตุ: การ merge โดย bot จะไม่ trigger อันนี้)
  push:
    branches:
      - main
    paths:
      - 'scr/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate clasp
        run: echo '${{ secrets.CLASP_TOKEN }}' > ~/.clasprc.json

      - name: Push code to Apps Script
        run: clasp push --force

      # redeploy deployment เดิม (id เดียวกับใน SCRIPT_URL /exec) → โค้ดใหม่ live โดย URL ไม่เปลี่ยน
      - name: Deploy new version (same /exec URL)
        run: clasp deploy -i AKfycbyt3Bf_2h21BBcCHQSjizowy_kD5vsoUqgaC_YmVjLuQybJO1BBRt3eaSM0PuKEFfvruw --description "Auto-deploy from GitHub Actions"
